<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Battle Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
transition:0.5s;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#000;
}

.logo{
font-size:28px;
color:red;
}

nav button{
margin:5px;
padding:10px 15px;
cursor:pointer;
}

.hero{
height:80vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:url("https://images.unsplash.com/photo-1542751371-adc38448a05e") center/cover;
}

.hero h1{
font-size:60px;
text-shadow:0 0 20px black;
}

.section{
padding:60px;
text-align:center;
}

.battles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#222;
padding:20px;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px red;
}

.card img{
width:100%;
border-radius:10px;
}

.online{
font-size:50px;
color:#00ffcc;
}

.themeButton{
margin:10px;
padding:10px;
}

#particles{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.light{
background:white;
color:black;
}

.dark{
background:#111;
color:white;
}

</style>

</head>

<body class="dark">

<canvas id="particles"></canvas>

<header>

<div class="logo">BATTLE HUB</div>

<nav>

<button onclick="scrollToSection('battles')">Battles</button>
<button onclick="scrollToSection('online')">Online</button>
<button onclick="changeTheme()">Theme</button>
<button onclick="changeMenuBackground()">Menu BG</button>

</nav>

</header>

<section class="hero" id="menu">

<h1>Epic Battles</h1>

<button onclick="playSound()">Start</button>

</section>

<section class="section" id="online">

<h2>Online players</h2>

<div class="online" id="onlineCount">0</div>

</section>

<section class="section" id="battles">

<h2>Battle Modes</h2>

<div class="battles">

<div class="card" onclick="battle()">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<h3>Sword Battle</h3>
</div>

<div class="card" onclick="battle()">
<img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f">
<h3>Gun Battle</h3>
</div>

<div class="card" onclick="battle()">
<img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437b5">
<h3>Cyber Fight</h3>
</div>

<div class="card" onclick="battle()">
<img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf">
<h3>Robot War</h3>
</div>

<div class="card" onclick="battle()">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<h3>Sniper Duel</h3>
</div>

<div class="card" onclick="battle()">
<img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee">
<h3>War Arena</h3>
</div>

</div>

</section>

<section class="section">

<h2>Theme</h2>

<button class="themeButton" onclick="setDark()">Dark</button>
<button class="themeButton" onclick="setLight()">Light</button>

</section>

<script>

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

function battle(){
playSound()
alert("Battle starting soon")
}

</script>

<script>

let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")

function playSound(){
audio.play()
}

</script>

<script>

function setLight(){
document.body.className="light"
}

function setDark(){
document.body.className="dark"
}

function changeTheme(){

if(document.body.className=="dark"){
setLight()
}else{
setDark()
}

}

</script>

<script>

let backgrounds=[

"https://images.unsplash.com/photo-1542751371-adc38448a05e",
"https://images.unsplash.com/photo-1511512578047-dfb367046420",
"https://images.unsplash.com/photo-1605902711622-cfb43c4437b5"

]

function changeMenuBackground(){

let bg=backgrounds[Math.floor(Math.random()*backgrounds.length)]

document.querySelector(".hero").style.background="url("+bg+") center/cover"

}

</script>

<script>

let canvas=document.getElementById("particles")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<100;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3,
speedX:(Math.random()-0.5),
speedY:(Math.random()-0.5)

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.speedX
p.y+=p.speedY

if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0

if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={

apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB",
projectId:"YOUR_PROJECT",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"YOUR_MSG",
appId:"YOUR_APP"

}

const app=initializeApp(firebaseConfig)

const db=getDatabase(app)

const onlineRef=ref(db,"online")

const userRef=ref(db,"online/"+Math.random())

set(userRef,true)

onDisconnect(userRef).remove()

onValue(onlineRef,(snap)=>{

let count=0
snap.forEach(()=>count++)

document.getElementById("onlineCount").innerText=count

})

</script>

</body>

</html>
