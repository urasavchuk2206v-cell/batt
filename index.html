<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Choice Game</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#000;
padding:15px;
text-align:center;
font-size:22px;
}

.screen{
display:none;
padding:20px;
text-align:center;
}

.active{
display:block;
}

button{
padding:14px 25px;
margin:10px;
border:none;
border-radius:8px;
font-size:18px;
background:#ff4444;
color:white;
cursor:pointer;
}

button:hover{
background:#ff2222;
}

.vote{
display:flex;
flex-direction:column;
gap:10px;
margin-top:20px;
}

.choice{
position:relative;
cursor:pointer;
}

.choice img{
width:100%;
max-height:320px;
object-fit:cover;
border-radius:10px;
}

.label{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:8px 10px;
border-radius:6px;
}

.stats{
font-size:20px;
margin-top:20px;
}

.online{
font-size:26px;
color:#00ffcc;
}

@media(min-width:700px){

.vote{
flex-direction:row;
}

.choice img{
height:420px;
}

}

</style>

</head>

<body>

<header>CHOICE GAME</header>

<!-- MENU -->

<div id="menu" class="screen active">

<h2>Меню</h2>

<button onclick="startGame()">Грати</button>
<button onclick="openStats()">Статистика</button>

</div>

<!-- GAME -->

<div id="game" class="screen">

<h2>Що краще?</h2>

<div class="vote">

<div class="choice" onclick="vote(1)">
<img id="img1">
<div class="label" id="text1"></div>
</div>

<div class="choice" onclick="vote(2)">
<img id="img2">
<div class="label" id="text2"></div>
</div>

</div>

<br>

<button onclick="exitGame()">Назад</button>

</div>

<!-- STATS -->

<div id="stats" class="screen">

<h2>Статистика</h2>

<div class="stats">

A: <span id="aVotes">0</span><br>
B: <span id="bVotes">0</span>

</div>

<br>

<div class="online">

Онлайн: <span id="onlineCount">0</span>

</div>

<br>

<button onclick="backMenu()">Назад</button>

</div>

<script>

let polls=[

{
a:"ATB",
b:"Silpo",
imgA:"https://upload.wikimedia.org/wikipedia/commons/5/5e/ATB-Market_logo.svg",
imgB:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Silpo_logo.svg"
},

{
a:"Pizza",
b:"Burger",
imgA:"https://images.unsplash.com/photo-1601924638867-3ec2c8c3c6b7",
imgB:"https://images.unsplash.com/photo-1550547660-d9450f859349"
},

{
a:"Cat",
b:"Dog",
imgA:"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba",
imgB:"https://images.unsplash.com/photo-1517849845537-4d257902454a"
},

{
a:"Tea",
b:"Coffee",
imgA:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
imgB:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"
}

]

let votesA=0
let votesB=0
let currentPoll

function show(id){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function startGame(){

show("game")
nextPoll()

}

function nextPoll(){

currentPoll=polls[Math.floor(Math.random()*polls.length)]

img1.src=currentPoll.imgA
img2.src=currentPoll.imgB

text1.innerText=currentPoll.a
text2.innerText=currentPoll.b

}

function vote(side){

if(side==1){
votesA++
}else{
votesB++
}

aVotes.innerText=votesA
bVotes.innerText=votesB

nextPoll()

}

function exitGame(){

show("menu")

}

function openStats(){

show("stats")

}

function backMenu(){

show("menu")

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import { getDatabase, ref, set, onDisconnect, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"

const firebaseConfig={

apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB",
projectId:"YOUR_PROJECT"

}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const onlineRef=ref(db,"online")
const userRef=ref(db,"online/"+Math.random())

set(userRef,true)

onDisconnect(userRef).remove()

onValue(onlineRef,(snap)=>{

let count=0
snap.forEach(()=>count++)

document.getElementById("onlineCount").innerText=count

})

</script>

</body>
</html>
