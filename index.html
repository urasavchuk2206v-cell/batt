<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Choice Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

header{
background:#000;
padding:15px;
text-align:center;
font-size:22px;
}

.screen{
display:none;
padding:20px;
text-align:center;
}

.active{
display:block;
}

button{
padding:14px 24px;
font-size:18px;
margin:10px;
cursor:pointer;
border:none;
background:#ff4444;
color:white;
border-radius:8px;
}

button:hover{
background:#ff2222;
}

.voteArea{
display:flex;
flex-direction:column;
gap:10px;
}

.choice{
position:relative;
cursor:pointer;
}

.choice img{
width:100%;
max-height:300px;
object-fit:cover;
border-radius:10px;
}

.label{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:8px;
border-radius:6px;
}

.stats{
margin-top:20px;
font-size:18px;
}

.online{
font-size:26px;
color:#00ffaa;
}

@media(min-width:700px){

.voteArea{
flex-direction:row;
}

.choice img{
height:400px;
}

}

</style>

</head>

<body>

<header>Choice Game</header>

<!-- MENU -->

<div id="menu" class="screen active">

<h2>Меню</h2>

<button onclick="startGame()">Грати</button>
<button onclick="openStats()">Статистика</button>

</div>

<!-- GAME -->

<div id="game" class="screen">

<h2>Обери</h2>

<div class="voteArea">

<div class="choice" onclick="vote(1)">
<img id="img1">
<div class="label" id="text1"></div>
</div>

<div class="choice" onclick="vote(2)">
<img id="img2">
<div class="label" id="text2"></div>
</div>

</div>

<br>

<button onclick="exitGame()">Назад</button>

</div>

<!-- STATS -->

<div id="stats" class="screen">

<h2>Статистика</h2>

<div class="stats">

Варіант A: <span id="countA">0</span><br>
Варіант B: <span id="countB">0</span>

</div>

<br>

<div class="online">

Онлайн: <span id="online">0</span>

</div>

<br>

<button onclick="backMenu()">Назад</button>

</div>

<script>

let polls=[

{
a:"ATB",
b:"Silpo",
imgA:"https://upload.wikimedia.org/wikipedia/commons/5/5e/ATB-Market_logo.svg",
imgB:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Silpo_logo.svg"
},

{
a:"Pizza",
b:"Burger",
imgA:"https://images.unsplash.com/photo-1601924638867-3ec2c8c3c6b7",
imgB:"https://images.unsplash.com/photo-1550547660-d9450f859349"
},

{
a:"Cat",
b:"Dog",
imgA:"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba",
imgB:"https://images.unsplash.com/photo-1517849845537-4d257902454a"
},

{
a:"Tea",
b:"Coffee",
imgA:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
imgB:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"
}

]

let votesA=0
let votesB=0

let current

function show(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function startGame(){

show("game")
nextPoll()

}

function nextPoll(){

current=polls[Math.floor(Math.random()*polls.length)]

img1.src=current.imgA
img2.src=current.imgB

text1.innerText=current.a
text2.innerText=current.b

}

function vote(side){

if(side==1){
votesA++
}else{
votesB++
}

countA.innerText=votesA
countB.innerText=votesB

nextPoll()

}

function exitGame(){

show("menu")

}

function openStats(){

show("stats")

}

function backMenu(){

show("menu")

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB",
projectId:"YOUR_PROJECT"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const onlineRef=ref(db,"online")
const userRef=ref(db,"online/"+Math.random())

set(userRef,true)

onDisconnect(userRef).remove()

onValue(onlineRef,(snap)=>{

let count=0
snap.forEach(()=>count++)

document.getElementById("online").innerText=count

})

</script>

</body>
</html>
