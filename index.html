<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>World Choice</title>

<style>

body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
transition:0.3s;
overflow-x:hidden;
}

header{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
color:#ff4444;
}

.menuButtons button{
margin-left:10px;
padding:10px 16px;
cursor:pointer;
border:none;
background:#222;
color:white;
}

.menuButtons button:hover{
background:#444;
}

#lobby{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#lobby h1{
font-size:50px;
margin-bottom:20px;
}

#lobby button{
padding:15px 30px;
font-size:18px;
margin:10px;
cursor:pointer;
}

#game{
display:none;
height:90vh;
}

.voteArea{
display:flex;
height:100%;
}

.choice{
flex:1;
position:relative;
cursor:pointer;
overflow:hidden;
}

.choice img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

.choice:hover img{
transform:scale(1.1);
}

.label{
position:absolute;
bottom:20px;
left:20px;
font-size:28px;
background:rgba(0,0,0,0.6);
padding:10px;
}

#resultBar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:8px;
background:#333;
}

#resultFill{
height:100%;
width:50%;
background:#00ffcc;
}

.sidePanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:#000;
padding:20px;
transition:0.4s;
overflow:auto;
}

.sidePanel.open{
right:0;
}

.statItem{
margin:10px 0;
}

.history{
margin-top:20px;
font-size:14px;
}

.light{
background:white;
color:black;
}

</style>

</head>

<body>

<header>

<div class="logo">WORLD CHOICE</div>

<div class="menuButtons">

<button onclick="openStats()">📊 Stats</button>
<button onclick="openOnline()">🌐 Online</button>
<button onclick="toggleTheme()">🎨 Theme</button>
<button onclick="exitGame()">❌ Exit</button>

</div>

</header>

<div id="lobby">

<h1>Choose One</h1>

<p>See what people prefer</p>

<button onclick="startGame()">Start</button>

</div>

<div id="game">

<div class="voteArea">

<div class="choice" onclick="vote(1)">

<img id="img1">

<div class="label" id="label1"></div>

</div>

<div class="choice" onclick="vote(2)">

<img id="img2">

<div class="label" id="label2"></div>

</div>

</div>

<div id="resultBar">
<div id="resultFill"></div>
</div>

</div>

<div id="statsPanel" class="sidePanel">

<h2>Statistics</h2>

<div class="statItem">Option A: <span id="s1">0</span></div>
<div class="statItem">Option B: <span id="s2">0</span></div>

<div class="history" id="history"></div>

</div>

<div id="onlinePanel" class="sidePanel">

<h2>Online</h2>

<div style="font-size:40px" id="onlineCount">0</div>

<p>Users voting now</p>

</div>

<script>

let votesA=0
let votesB=0

let history=[]

let polls=[

{a:"ATB",b:"Silpo",
imgA:"https://upload.wikimedia.org/wikipedia/commons/5/5e/ATB-Market_logo.svg",
imgB:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Silpo_logo.svg"},

{a:"Pizza",b:"Burger",
imgA:"https://images.unsplash.com/photo-1601924638867-3ec2c8c3c6b7",
imgB:"https://images.unsplash.com/photo-1550547660-d9450f859349"},

{a:"Cat",b:"Dog",
imgA:"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba",
imgB:"https://images.unsplash.com/photo-1517849845537-4d257902454a"},

{a:"BMW",b:"Mercedes",
imgA:"https://images.unsplash.com/photo-1552519507-da3b142c6e3d",
imgB:"https://images.unsplash.com/photo-1549921296-3b0f2f5f0b7e"},

{a:"Tea",b:"Coffee",
imgA:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
imgB:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"}

]

let current

function startGame(){

document.getElementById("lobby").style.display="none"
document.getElementById("game").style.display="block"

nextPoll()

}

function nextPoll(){

current=polls[Math.floor(Math.random()*polls.length)]

img1.src=current.imgA
img2.src=current.imgB

label1.innerText=current.a
label2.innerText=current.b

}

function vote(side){

if(side==1){

votesA++
history.push(current.a)

}else{

votesB++
history.push(current.b)

}

updateStats()

nextPoll()

}

function updateStats(){

s1.innerText=votesA
s2.innerText=votesB

let total=votesA+votesB

let percent=votesA/total*100

resultFill.style.width=percent+"%"

historyBox=""

history.slice(-10).forEach(h=>{
historyBox+=h+"<br>"
})

document.getElementById("history").innerHTML=historyBox

}

function exitGame(){

document.getElementById("game").style.display="none"
document.getElementById("lobby").style.display="flex"

}

function openStats(){

document.getElementById("statsPanel").classList.toggle("open")

}

function openOnline(){

document.getElementById("onlinePanel").classList.toggle("open")

}

function toggleTheme(){

document.body.classList.toggle("light")

}

</script>

<script>

let online=20+Math.floor(Math.random()*50)

setInterval(()=>{

online+=Math.floor(Math.random()*3)-1

if(online<1)online=1

onlineCount.innerText=online

},2000)

</script>

</body>
