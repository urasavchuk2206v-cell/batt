<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хто краще?</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

h1 { margin-top:80px; }

.battle {
  display:flex;
  height:100vh;
}

.option {
  width:50%;
  cursor:pointer;
  position:relative;
}

.option img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.label {
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:30px;
  font-weight:bold;
  text-shadow:0 0 10px black;
}

#start {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

button {
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="start">
  <h1>Хто краще?</h1>
  <button onclick="start()">Почати</button>
</div>

<div id="game" class="battle" style="display:none;">
  <div class="option" onclick="next()">
    <img id="img1">
    <div class="label" id="text1"></div>
  </div>

  <div class="option" onclick="next()">
    <img id="img2">
    <div class="label" id="text2"></div>
  </div>
</div>

<script>
const pairs = [
  {
    a:"АТБ",
    b:"Сільпо",
    imgA:"https://upload.wikimedia.org/wikipedia/commons/7/7f/ATB-Market_logo.png",
    imgB:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Silpo_logo.png"
  },
  {
    a:"Піцца",
    b:"Суші",
    imgA:"https://picsum.photos/800/600?1",
    imgB:"https://picsum.photos/800/600?2"
  },
  {
    a:"Кава",
    b:"Чай",
    imgA:"https://picsum.photos/800/600?3",
    imgB:"https://picsum.photos/800/600?4"
  }
];

let current;

function start(){
  document.getElementById("start").style.display="none";
  document.getElementById("game").style.display="flex";
  load();
}

function load(){
  current = pairs[Math.floor(Math.random()*pairs.length)];

  document.getElementById("img1").src = current.imgA;
  document.getElementById("img2").src = current.imgB;

  document.getElementById("text1").innerText = current.a;
  document.getElementById("text2").innerText = current.b;
}

function next(){
  load();
}
</script>

</body>
</html>
