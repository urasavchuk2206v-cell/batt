<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Battle Vote</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

header{
background:#000;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
color:red;
}

button{
padding:12px 20px;
cursor:pointer;
font-size:16px;
}

.center{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
flex-direction:column;
}

.voteArea{
display:none;
height:80vh;
display:flex;
}

.choice{
flex:1;
position:relative;
cursor:pointer;
overflow:hidden;
}

.choice img{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

.choice:hover img{
transform:scale(1.1);
}

.label{
position:absolute;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:10px;
font-size:22px;
}

#statsPanel{
position:fixed;
right:-400px;
top:0;
width:400px;
height:100%;
background:#000;
padding:20px;
transition:0.4s;
}

#statsPanel.open{
right:0;
}

.stat{
margin:10px 0;
}

.online{
font-size:40px;
color:#00ffaa;
}

</style>

</head>

<body>

<header>

<div class="logo">BATTLE VOTE</div>

<div>

<button onclick="start()">Start</button>

<button onclick="toggleStats()">Online</button>

</div>

</header>

<div class="center" id="menu">

<h1>Choose What Is Better</h1>

<p>Vote and see what people prefer</p>

</div>

<div class="voteArea" id="voteArea">

<div class="choice" onclick="vote(1)">

<img id="img1">

<div class="label" id="label1"></div>

</div>

<div class="choice" onclick="vote(2)">

<img id="img2">

<div class="label" id="label2"></div>

</div>

</div>

<div id="statsPanel">

<h2>Statistics</h2>

<div class="online" id="onlineCount">0</div>

<div class="stat">
Option 1 votes: <span id="v1">0</span>
</div>

<div class="stat">
Option 2 votes: <span id="v2">0</span>
</div>

</div>

<script>

let votes1=0
let votes2=0

let battles=[

{
a:"ATB",
b:"Silpo",
imgA:"https://upload.wikimedia.org/wikipedia/commons/5/5e/ATB-Market_logo.svg",
imgB:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Silpo_logo.svg"
},

{
a:"Pizza",
b:"Burger",
imgA:"https://images.unsplash.com/photo-1601924638867-3ec2c8c3c6b7",
imgB:"https://images.unsplash.com/photo-1550547660-d9450f859349"
},

{
a:"Cat",
b:"Dog",
imgA:"https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba",
imgB:"https://images.unsplash.com/photo-1517849845537-4d257902454a"
},

{
a:"BMW",
b:"Mercedes",
imgA:"https://images.unsplash.com/photo-1552519507-da3b142c6e3d",
imgB:"https://images.unsplash.com/photo-1549921296-3b0f2f5f0b7e"
},

{
a:"Truth",
b:"Lie",
imgA:"https://images.unsplash.com/photo-1520974735194-5f2e89c3a9c6",
imgB:"https://images.unsplash.com/photo-1581091870627-3a52e7f1b8c2"
},

{
a:"Tea",
b:"Coffee",
imgA:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
imgB:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"
}

]

let current

function start(){

document.getElementById("menu").style.display="none"
document.getElementById("voteArea").style.display="flex"

nextBattle()

}

function nextBattle(){

current=battles[Math.floor(Math.random()*battles.length)]

document.getElementById("img1").src=current.imgA
document.getElementById("img2").src=current.imgB

document.getElementById("label1").innerText=current.a
document.getElementById("label2").innerText=current.b

}

function vote(side){

if(side==1){

votes1++

}else{

votes2++

}

document.getElementById("v1").innerText=votes1
document.getElementById("v2").innerText=votes2

nextBattle()

}

</script>

<script>

function toggleStats(){

let panel=document.getElementById("statsPanel")

panel.classList.toggle("open")

}

</script>

<script>

let online=Math.floor(Math.random()*50)+10

setInterval(()=>{

online+=Math.floor(Math.random()*3)-1

if(online<1)online=1

document.getElementById("onlineCount").innerText=online

},2000)

</script>

</body>

</html>
