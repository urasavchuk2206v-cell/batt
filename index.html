<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Битва Виборів | Обери свій шлях</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .app-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.5);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .header-stats {
            background: #1e1f24cc;
            backdrop-filter: blur(20px);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .online-box {
            background: #00000055;
            padding: 6px 14px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 6px #2ecc71;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .avatar-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .avatar-mini {
            width: 36px;
            height: 36px;
            background: #4a4e6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: 2px solid #fff;
        }

        .screen {
            padding: 24px 20px 34px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .hidden {
            display: none;
        }

        .btn {
            background: #2c2e3a;
            border: none;
            padding: 14px 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            width: 100%;
            margin: 8px 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3f4e74, #2d3a58);
        }

        .btn-primary:active { transform: scale(0.97); }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #3f4e74;
            color: #1f2c46;
        }

        .btn-donate {
            background: linear-gradient(135deg, #e67e22, #d35400);
        }

        .game-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .option-card {
            flex: 1;
            background: white;
            border-radius: 48px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
            border: 1px solid #ffffffaa;
        }

        .option-card:active { transform: scale(0.96); }
        
        .option-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 40px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #e0e0e0, #f5f5f5);
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }
        
        .emoji-placeholder {
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            background: linear-gradient(135deg, #ffe6f0, #ffd4e5);
            border-radius: 40px;
            margin-bottom: 16px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        .stat-container {
            background: #f8f9ffcc;
            border-radius: 32px;
            padding: 20px;
            margin-top: 15px;
            max-height: 55vh;
            overflow-y: auto;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ccc;
            padding: 12px 0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: #3f4e74;
            transition: width 0.3s;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.75rem;
            border-top: 1px solid #ddd9;
            background: #ffffff40;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 1px solid #bbb;
            margin-bottom: 16px;
            font-size: 16px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }

        .card-number {
            font-size: 1.2rem;
            font-weight: bold;
            background: #f0f2f5;
            padding: 12px;
            border-radius: 60px;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .close-modal {
            background: #2c2e3a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        
        @media (max-width: 550px) {
            .option-img, .emoji-placeholder { width: 110px; height: 110px; font-size: 4rem;}
            .game-options { gap: 12px;}
            .stat-item { flex-direction: column; align-items: flex-start;}
        }
        
        @media (max-width: 480px) {
            .option-img, .emoji-placeholder { width: 90px; height: 90px; font-size: 3rem;}
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header-stats">
        <div class="online-box">
            <span class="online-dot"></span>
            <span id="onlineCounter">67</span> <span>онлайн</span>

    <!-- Екран реєстрації -->
    <div id="registerScreen" class="screen">

        <input type="text" id="usernameInput" placeholder="Твоє ім'я (напр. Максим)" autocomplete="off">

        <button id="authorBtn" style="margin-top: 25px; background:none; border:none; color:#2c3e66; text-decoration:underline; cursor:pointer;">Автор: Савчук Юрій</button>
    </div>

    <!-- Головне меню -->
    <div id="menuScreen" class="screen hidden">
        <div style="text-align:center; margin-bottom:20px; font-size:1.2rem;" id="greetingMsg">Вітаю, <strong id="userNameDisplay">Гість</strong>!</div>
        <div style="margin: 20px 0;">
            <button id="playBtnMenu" class="btn btn-primary">🎮 ГРАТИ</button>
            <button id="statsBtnMenu" class="btn btn-outline">📊 СТАТИСТИКА</button>
            <button id="donateBtnMenu" class="btn btn-donate">💛 ПІДТРИМАТИ ДОНАТОМ</button>
            <button id="logoutBtnMenu" class="btn" style="background:#5a626e;">🚪 Вийти</button>
        </div>
        <footer>⚡ обери між двома — без підтверджень, одразу наступне питання!</footer>

    <!-- Екран гри -->
    <div id="gameScreen" class="screen hidden">
        <div style="text-align: center; margin-bottom: 10px; font-size: 0.9rem; color: #666;">
            Питання <span id="questionIndex">1</span> / <span id="totalQuestions">0</span>
        </div>
        <h3 id="questionText" style="margin-bottom:16px; text-align:center;">Чай ☕ чи Кава?</h3>
        <div class="game-options" id="gameOptionsContainer"></div>
        <button id="backToMenuFromGame" class="btn btn-outline">⬅ Назад в меню</button>
    </div>

    <!-- Статистика -->
    <div id="statsScreen" class="screen hidden">
        <h3>📈 Глобальна статистика виборів</h3>
        <div id="statList" class="stat-container">Завантаження...</div>
        <button id="backToMenuFromStats" class="btn btn-outline" style="margin-top:18px;">🏠 До меню</button>
    </div>
</div>

<script>
    // ==================== РОЗШИРЕНА БАЗА ПИТАНЬ (30+ унікальних) ====================
    const QUESTION_BANK = [

        { id: 7, text: "Ти хто?", optA: "Оптиміст 🌞", optB: "Песиміст 🌧️", imgA: "sun", imgB: "rain", special: true, emojiA: "☀️", emojiB: "⛈️" },

        { id: 9, text: "Куди поїдемо?", optA: "Пляж 🌊", optB: "Гори ⛰️", imgA: "https://picsum.photos/id/15/300/200", imgB: "https://picsum.photos/id/104/300/200", special: false },
        { id: 10, text: "Італійська кухня?", optA: "Піца 🍕", optB: "Паста 🍝", imgA: "https://picsum.photos/id/108/300/200", imgB: "https://picsum.photos/id/127/300/200", special: false },

        { id: 12, text: "Твій стиль?", optA: "Класика 👔", optB: "Кежуал 👕", imgA: "https://picsum.photos/id/114/300/200", imgB: "https://picsum.photos/id/155/300/200", special: false },
        { id: 13, text: "Що обираєш у вихідні?", optA: "Кіно 🎬", optB: "Прогулянка 🌳", imgA: "https://picsum.photos/id/184/300/200", imgB: "https://picsum.photos/id/96/300/200", special: false },
        { id: 14, text: "Твоя суперсила?", optA: "Невидимість 👻", optB: "Політ 🦅", imgA: "https://picsum.photos/id/251/300/200", imgB: "https://picsum.photos/id/31/300/200", special: false },
        { id: 15, text: "Що береш на острів?", optA: "Книга 📖", optB: "Музика 🎵", imgA: "https://picsum.photos/id/0/300/200", imgB: "https://picsum.photos/id/139/300/200", special: false },
        { id: 16, text: "Твій ідеальний вечір?", optA: "Netflix 🍿", optB: "Вечірка 🎉", imgA: "https://picsum.photos/id/20/300/200", imgB: "https://picsum.photos/id/29/300/200", special: false },
        { id: 17, text: "Що обираєш?", optA: "Розум 🧠", optB: "Краса 💅", imgA: "https://picsum.photos/id/125/300/200", imgB: "https://picsum.photos/id/26/300/200", special: false },
        { id: 18, text: "Твоя стихія?", optA: "Вогонь 🔥", optB: "Вода 💧", imgA: "https://picsum.photos/id/131/300/200", imgB: "https://picsum.photos/id/15/300/200", special: false },
        { id: 19, text: "Що краще?", optA: "Солодке 🍰", optB: "Солоний 🍟", imgA: "https://picsum.photos/id/108/300/200", imgB: "https://picsum.photos/id/127/300/200", special: false },
        { id: 20, text: "Твій транспорт?", optA: "Авто 🚗", optB: "Велосипед 🚲", imgA: "https://picsum.photos/id/107/300/200", imgB: "https://picsum.photos/id/131/300/200", special: false },
        { id: 21, text: "Що важливіше в роботі?", optA: "Гроші 💰", optB: "Задоволення 😊", imgA: "https://picsum.photos/id/29/300/200", imgB: "https://picsum.photos/id/20/300/200", special: false },
        { id: 22, text: "Твій ранг в іграх?", optA: "Танк 🛡️", optB: "Маг 🔮", imgA: "https://picsum.photos/id/106/300/200", imgB: "https://picsum.photos/id/195/300/200", special: false },
        { id: 23, text: "Що обираєш?", optA: "Сон 😴", optB: "Їжа 🍔", imgA: "https://picsum.photos/id/229/300/200", imgB: "https://picsum.photos/id/108/300/200", special: false },
        { id: 24, text: "Твій улюблений жанр?", optA: "Комедія 😂", optB: "Жахи 👻", imgA: "https://picsum.photos/id/189/300/200", imgB: "https://picsum.photos/id/251/300/200", special: false },
        { id: 25, text: "Що обираєш вранці?", optA: "Зарядка 💪", optB: "Спати довше 🛌", imgA: "https://picsum.photos/id/143/300/200", imgB: "https://picsum.photos/id/229/300/200", special: false },
        { id: 26, text: "Твій улюблений колір?", optA: "Чорний 🖤", optB: "Білий 🤍", imgA: "https://picsum.photos/id/114/300/200", imgB: "https://picsum.photos/id/155/300/200", special: false },
        { id: 27, text: "Що обираєш?", optA: "Кіберпанк 🤖", optB: "Фентезі 🧙", imgA: "https://picsum.photos/id/106/300/200", imgB: "https://picsum.photos/id/96/300/200", special: false },
        { id: 28, text: "Твій ідеальний подарунок?", optA: "Подорож ✈️", optB: "Гаджет 📱", imgA: "https://picsum.photos/id/15/300/200", imgB: "https://picsum.photos/id/0/300/200", special: false },
        { id: 29, text: "Що важливіше?", optA: "Здоров'я ❤️", optB: "Успіх 🏆", imgA: "https://picsum.photos/id/143/300/200", imgB: "https://picsum.photos/id/107/300/200", special: true, emojiA: "❤️", emojiB: "🏆" },
        { id: 30, text: "Твій звір", optA: "Вовк 🐺", optB: "Лев 🦁", imgA: "https://picsum.photos/id/237/300/200", imgB: "https://picsum.photos/id/219/300/200", special: false }
    ];

    // ==================== ЗМІННІ ====================
    let currentUser = null;
    let currentQuestionIndex = 0;
    let remainingQuestions = [];
    let statsData = {};

    // Завантаження статистики з localStorage
    function loadStatsFromStorage() {
        const saved = localStorage.getItem('battle_stats');
        if (saved) {
            statsData = JSON.parse(saved);
        } else {
            statsData = {};
            QUESTION_BANK.forEach(q => {
                statsData[q.id] = { A: 0, B: 0 };
            });
        }
        updateStatsDisplay();
    }

    function saveStatsToStorage() {
        localStorage.setItem('battle_stats', JSON.stringify(statsData));
    }

    // Голосування БЕЗ ПІДТВЕРДЖЕННЯ
    function vote(questionId, choice) {
        if (!statsData[questionId]) statsData[questionId] = { A: 0, B: 0 };
        statsData[questionId][choice]++;
        saveStatsToStorage();
        updateStatsDisplay();
    }

    function updateStatsDisplay() {
        const statsDiv = document.getElementById('statList');
        if (!statsDiv) return;
        
        let html = '';
        for (let q of QUESTION_BANK) {
            let qStats = statsData[q.id] || { A: 0, B: 0 };
            let total = (qStats.A || 0) + (qStats.B || 0);
            let percentA = total ? Math.round((qStats.A || 0)/total*100) : 50;
            let percentB = total ? Math.round((qStats.B || 0)/total*100) : 50;
            html += `<div class="stat-item">
                        <strong>${q.text}</strong>
                        <span>✅ ${q.optA}: ${percentA}% (${qStats.A||0}) &nbsp;|&nbsp; ${q.optB}: ${percentB}% (${qStats.B||0})</span>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${percentA}%;"></div></div>
                     </div>`;
        }
        statsDiv.innerHTML = html || "<i>Немає голосів, будь першим!</i>";
    }

    function generateSlug(name) {
        if (!name) return "Анонім";
        let base = name.trim().split(" ")[0];
        let suffix = Math.floor(Math.random() * 100);
        let funny = ["Суслік", "Вовчик", "Кексик", "Маг", "Лис", "Хижак", "Смайлик", "Грім", "Сонечко", "Їжак", "Кролик", "Ведмедик", "Панда", "Тигр"];
        let rand = funny[Math.floor(Math.random() * funny.length)];
        return `${base} ${rand}${suffix}`;
    }

    // Ініціалізація гри (перемішуємо питання)
    function initGame() {
        remainingQuestions = [...QUESTION_BANK];
        for (let i = remainingQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [remainingQuestions[i], remainingQuestions[j]] = [remainingQuestions[j], remainingQuestions[i]];
        }
        currentQuestionIndex = 0;
        document.getElementById('totalQuestions').innerText = remainingQuestions.length;
        document.getElementById('questionIndex').innerText = currentQuestionIndex + 1;
    }

    function startGame() {
        if (!remainingQuestions.length || currentQuestionIndex >= remainingQuestions.length) {
            initGame();
        }
        
        const qData = remainingQuestions[currentQuestionIndex];
        document.getElementById('questionText').innerHTML = qData.text;
        document.getElementById('questionIndex').innerText = currentQuestionIndex + 1;
        const container = document.getElementById('gameOptionsContainer');
        
        let optionAHtml, optionBHtml;
        
        if (qData.special) {
            optionAHtml = `
                <div class="option-card" data-choice="A" data-id="${qData.id}">
                    <div class="emoji-placeholder">${qData.emojiA || '❤️'}</div>
                    <h3>${qData.optA}</h3>
                </div>
            `;
            optionBHtml = `
                <div class="option-card" data-choice="B" data-id="${qData.id}">
                    <div class="emoji-placeholder">${qData.emojiB || '💔'}</div>
                    <h3>${qData.optB}</h3>
                </div>
            `;
        } else {
            optionAHtml = `
                <div class="option-card" data-choice="A" data-id="${qData.id}">
                    <img class="option-img" src="${qData.imgA}" alt="varA" loading="lazy">
                    <h3>${qData.optA}</h3>
                </div>
            `;
            optionBHtml = `
                <div class="option-card" data-choice="B" data-id="${qData.id}">
                    <img class="option-img" src="${qData.imgB}" alt="varB" loading="lazy">
                    <h3>${qData.optB}</h3>
                </div>
            `;
        }
        
        container.innerHTML = optionAHtml + optionBHtml;
        
        // Обробники без підтвердження - одразу наступне питання
        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', function onClick() {
                const choiceVal = this.getAttribute('data-choice');
                const questionId = parseInt(this.getAttribute('data-id'));
                vote(questionId, choiceVal);
                playSoftClick();
                
                // Анімація кліку
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                    // Переходимо до наступного питання
                    currentQuestionIndex++;
                    if (currentQuestionIndex >= remainingQuestions.length) {
                        // Пройшли всі питання - починаємо заново
                        initGame();
                    }
                    startGame();
                }, 150);
            }, { once: true });
        });
        
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('statsScreen').classList.add('hidden');
    }

            return false;

        const name = rawName.trim();
        const slug = generateSlug(name);
        const uid = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        
        currentUser = { uid, name, slug };
        localStorage.setItem('current_user', JSON.stringify(currentUser));
        
        document.getElementById('userNameDisplay').innerHTML = `${name} <span style="font-size:0.8rem;">(${slug})</span>`;
        document.getElementById('greetingMsg').innerHTML = `Вітаю, <strong>${name}</strong>! Твій нік: ${slug}`;
        document.getElementById('myAvatarPreview').innerText = name.charAt(0).toUpperCase();
        
        // Генеруємо статичні аватарки онлайн (67 людей)
        const avatarDiv = document.getElementById('avatarGroupHeader');
        avatarDiv.innerHTML = '';
        const letters = ['М', 'А', 'К', 'С', 'Ю', 'В', 'О', 'Л', 'Д', 'Т', 'Н', 'І', 'Р', 'Є', 'П'];
        for (let i = 0; i < 6; i++) {
            const ava = document.createElement('div');
            ava.className = 'avatar-mini';
            ava.style.background = `hsl(${Math.random() * 360}, 50%, 45%)`;
            ava.innerText = letters[Math.floor(Math.random() * letters.length)];
            avatarDiv.appendChild(ava);
        }
        
        document.getElementById('registerScreen').classList.add('hidden');
        document.getElementById('menuScreen').classList.remove('hidden');
        
        initGame();
        return true;
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('current_user');
        document.getElementById('registerScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
        document.getElementById('statsScreen').classList.add('hidden');

    function checkSavedUser() {
        const saved = localStorage.getItem('current_user');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                document.getElementById('userNameDisplay').innerHTML = `${currentUser.name} <span style="font-size:0.8rem;">(${currentUser.slug})</span>`;
                document.getElementById('greetingMsg').innerHTML = `Вітаю, <strong>${currentUser.name}</strong>! Твій нік: ${currentUser.slug}`;
                document.getElementById('myAvatarPreview').innerText = currentUser.name.charAt(0).toUpperCase();
                document.getElementById('registerScreen').classList.add('hidden');
                document.getElementById('menuScreen').classList.remove('hidden');
                initGame();
                return true;
            } catch(e) {}
        }
        return false;
    }
