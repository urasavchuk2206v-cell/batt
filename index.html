<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Битва Виборів | Обери свій шлях</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
            position: relative;
        }

        /* Головний контейнер з м'якими тінями */
        .app-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.5);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            z-index: 10;
        }

        /* Хедер з онлайном */
        .header-stats {
            background: #1e1f24cc;
            backdrop-filter: blur(20px);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .online-box {
            background: #00000055;
            padding: 6px 14px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 6px #2ecc71;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .avatar-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .avatar-mini {
            width: 36px;
            height: 36px;
            background: #4a4e6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            background-size: cover;
            color: white;
            border: 2px solid #fff;
        }

        /* Панель головного меню та екранів */
        .screen {
            padding: 24px 20px 34px;
            transition: 0.3s ease;
        }

        .hidden {
            display: none;
        }

        /* Кнопки стильні */
        .btn {
            background: #2c2e3a;
            border: none;
            padding: 14px 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            width: 100%;
            margin: 8px 0;
            position: relative;
            z-index: 20;
            pointer-events: auto;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3f4e74, #2d3a58);
        }

        .btn-primary:active { transform: scale(0.97); background: #1f2c46;}

        .btn-outline {
            background: transparent;
            border: 1.5px solid #3f4e74;
            color: #1f2c46;
        }

        .game-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .option-card {
            flex: 1;
            background: white;
            border-radius: 48px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
            border: 1px solid #ffffffaa;
            position: relative;
            z-index: 15;
            pointer-events: auto;
        }

        .option-card:active { transform: scale(0.96);}
        
        .option-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 40px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #e0e0e0, #f5f5f5);
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }
        
        .emoji-placeholder {
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            background: linear-gradient(135deg, #ffe6f0, #ffd4e5);
            border-radius: 40px;
            margin-bottom: 16px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        .welcome-name {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg,#2c3e66,#1b1e2e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Статистика прогресс */
        .stat-container {
            background: #f8f9ffcc;
            border-radius: 32px;
            padding: 20px;
            margin-top: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ccc;
            padding: 12px 0;
            flex-wrap: wrap;
            gap: 8px;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.75rem;
            border-top: 1px solid #ddd9;
            background: #ffffff40;
        }
        
        input, button {
            pointer-events: auto;
        }
        
        @media (max-width: 550px) {
            .option-img, .emoji-placeholder { width: 110px; height: 110px; font-size: 4rem;}
            .game-options { gap: 12px;}
            .stat-item { flex-direction: column; align-items: flex-start;}
        }
        
        @media (max-width: 480px) {
            .option-img, .emoji-placeholder { width: 90px; height: 90px; font-size: 3rem;}
        }
        
        /* Анімація завантаження */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .screen:not(.hidden) { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="header-stats">
        <div class="online-box">
            <span class="online-dot"></span>
            <span id="onlineCounter">0</span> <span>онлайн</span>
        </div>
        <div class="avatar-group" id="avatarGroupHeader">
            <div class="avatar-mini" id="myAvatarPreview">🙂</div>
        </div>
    </div>

    <!-- Екран реєстрації (ім'я) -->
    <div id="registerScreen" class="screen">
        <h2 style="text-align:center; margin-bottom:20px;">✨ Битва виборів ✨</h2>
        <input type="text" id="usernameInput" placeholder="Твоє ім'я (напр. Максим)" style="width:100%; padding:14px; border-radius: 60px; border: 1px solid #bbb; margin-bottom: 16px; font-size:16px; pointer-events:auto;">
        <button id="startRegisterBtn" class="btn btn-primary">🚀 Почати подорож</button>
        <div style="margin-top:20px; font-size:12px; color:#555; text-align:center;">💡 Унікальне скорочення: <span id="previewNick">Макс Суслік</span></div>
        <button id="authorBtn" style="margin-top: 25px; background:none; border:none; color:#2c3e66; text-decoration:underline; cursor:pointer;">Автор: Савчук Юрій</button>
    </div>

    <!-- Головне меню -->
    <div id="menuScreen" class="screen hidden">
        <div style="text-align:center; margin-bottom:20px;" id="greetingMsg">Вітаю, <strong id="userNameDisplay">Гість</strong>!</div>
        <div style="margin: 20px 0;">
            <button id="playBtnMenu" class="btn btn-primary">🎮 ГРАТИ</button>
            <button id="statsBtnMenu" class="btn btn-outline">📊 СТАТИСТИКА</button>
            <button id="logoutBtnMenu" class="btn" style="background:#5a626e;">🚪 Вийти</button>
        </div>
        <footer>⚡ обирай між двома — правда життя</footer>
    </div>

    <!-- Екран гри (вибір картинок) -->
    <div id="gameScreen" class="screen hidden">
        <h3 id="questionText" style="margin-bottom:16px; text-align:center;">Чай ☕ чи Кава?</h3>
        <div class="game-options" id="gameOptionsContainer"></div>
        <button id="backToMenuFromGame" class="btn btn-outline">⬅ Назад в меню</button>
    </div>

    <!-- Статистика -->
    <div id="statsScreen" class="screen hidden">
        <h3>📈 Глобальна статистика виборів</h3>
        <div id="statList" class="stat-container">Завантаження...</div>
        <button id="backToMenuFromStats" class="btn btn-outline" style="margin-top:18px;">🏠 До меню</button>
    </div>
</div>

<script>
    // ---------- Firebase конфіг (твій проект) ----------
    const firebaseConfig = {
        apiKey: "AIzaSyB4kK8X9Tz5qQ3WfYkLpM2nVxJZq7HdGxo",
        authDomain: "batt-8d3c3.firebaseapp.com",
        databaseURL: "https://batt-8d3c3-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "batt-8d3c3",
        storageBucket: "batt-8d3c3.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abc123def456"
    };
    // (Заміни на реальні дані з Firebase консолі)
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // Глобальні змінні
    let currentUser = null;
    let currentQuestionSet = null;
    let statsListenerRef = null;

    // Питання/пари з підтримкою спеціальних іконок для абстрактних тем
    const QUESTION_BANK = [
        { id: "tea_coffee", text: "Що обираєш сьогодні?", optA: "Чай 🍃", optB: "Кава ☕", imgA: "https://picsum.photos/id/225/300/200", imgB: "https://picsum.photos/id/431/300/200", special: false },
        { id: "milf_student", text: "Хто твій вайб?", optA: "Мілфа ✨", optB: "Студентка 🎓", imgA: "https://picsum.photos/id/26/300/200", imgB: "https://picsum.photos/id/20/300/200", special: false },
        { id: "cars_value", text: "Що важливіше?", optA: "Машини 🚗", optB: "Цінності 💎", imgA: "https://picsum.photos/id/107/300/200", imgB: "https://picsum.photos/id/42/300/200", special: false },
        { id: "truth_lie", text: "Правда чи брехня?", optA: "Правда 🧠", optB: "Брехня 🎭", imgA: "heart", imgB: "broken", special: true, emojiA: "❤️", emojiB: "💔" },
        { id: "moments_money", text: "Життєві моменти?", optA: "Моменти 📸", optB: "Гроші 💰", imgA: "https://picsum.photos/id/20/300/200", imgB: "https://picsum.photos/id/29/300/200", special: false },
        { id: "love_hate", text: "Ставлення до життя?", optA: "Любов 💕", optB: "Байдужість 😐", imgA: "heart", imgB: "neutral", special: true, emojiA: "💖", emojiB: "💨" },
        { id: "optimist_pessimist", text: "Ти хто?", optA: "Оптиміст 🌞", optB: "Песиміст 🌧️", imgA: "sun", imgB: "rain", special: true, emojiA: "☀️", emojiB: "⛈️" },
        { id: "cats_dogs", text: "Хто кращий друг?", optA: "Коти 🐱", optB: "Собаки 🐶", imgA: "https://picsum.photos/id/219/300/200", imgB: "https://picsum.photos/id/237/300/200", special: false },
        { id: "beach_mount", text: "Відпочинок?", optA: "Пляж 🌊", optB: "Гори ⛰️", imgA: "https://picsum.photos/id/15/300/200", imgB: "https://picsum.photos/id/104/300/200", special: false }
    ];

    // Функція генерування індивідуального скорочення
    function generateSlug(name) {
        if (!name) return "Анонім";
        let base = name.trim().split(" ")[0];
        let suffix = Math.floor(Math.random() * 100);
        let funny = ["Суслік", "Вовчик", "Кексик", "Маг", "Лис", "Хижак", "Смайлик", "Грім", "Блискавка", "Сонечко"];
        let rand = funny[Math.floor(Math.random() * funny.length)];
        return `${base} ${rand}${suffix}`;
    }

    // Оновлення онлайн + аватарки
    function updateOnlineStatus() {
        if (!currentUser) return;
        const userStatusRef = database.ref(`/status/${currentUser.uid}`);
        const connectedRef = database.ref('.info/connected');
        connectedRef.on('value', (snap) => {
            if (snap.val() === true) {
                userStatusRef.onDisconnect().remove();
                userStatusRef.set({ name: currentUser.name, slug: currentUser.slug, timestamp: Date.now() });
                database.ref('/status').on('value', (snapshot) => {
                    const users = snapshot.val() || {};
                    const count = Object.keys(users).length;
                    document.getElementById('onlineCounter').innerText = count;
                    const avatarDiv = document.getElementById('avatarGroupHeader');
                    avatarDiv.innerHTML = '';
                    let idx = 0;
                    for (let uid in users) {
                        if (idx >= 5) break;
                        let userData = users[uid];
                        let letter = userData.name ? userData.name.charAt(0).toUpperCase() : "?";
                        const ava = document.createElement('div');
                        ava.className = 'avatar-mini';
                        ava.style.background = "#4e5b7b";
                        ava.innerText = letter;
                        if (uid === currentUser.uid) ava.style.border = "3px solid gold";
                        avatarDiv.appendChild(ava);
                        idx++;
                    }
                    if (idx === 0) avatarDiv.innerHTML = '<div class="avatar-mini">🌐</div>';
                });
            }
        });
    }

    // Запис голосу в Firebase
    async function vote(questionId, choice) {
        if (!currentUser) return;
        const voteRef = database.ref(`/votes/${questionId}`);
        const increment = firebase.database.ServerValue.increment(1);
        const update = {};
        update[`${choice}`] = increment;
        await voteRef.update(update);
        await database.ref(`/user_votes/${currentUser.uid}/${questionId}`).set(choice);
    }

    // Підписка на статистику
    function loadGlobalStats() {
        if (statsListenerRef) statsListenerRef.off();
        const statsDiv = document.getElementById('statList');
        statsDiv.innerHTML = "Завантаження даних...";
        const allVotesRef = database.ref('/votes');
        statsListenerRef = allVotesRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            let html = '';
            for (let q of QUESTION_BANK) {
                let qStats = data[q.id] || { A: 0, B: 0 };
                let total = (qStats.A || 0) + (qStats.B || 0);
                let percentA = total ? Math.round((qStats.A || 0)/total*100) : 50;
                let percentB = total ? Math.round((qStats.B || 0)/total*100) : 50;
                html += `<div class="stat-item">
                            <strong>${q.text}</strong>
                            <span>✅ ${q.optA}: ${percentA}% (${qStats.A||0}) &nbsp;|&nbsp; ${q.optB}: ${percentB}% (${qStats.B||0})</span>
                         </div>`;
            }
            statsDiv.innerHTML = html || "<i>Немає голосів, будь першим!</i>";
        });
    }

    // Вихід
    function logout() {
        if (currentUser) {
            database.ref(`/status/${currentUser.uid}`).remove();
        }
        currentUser = null;
        document.getElementById('registerScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
        document.getElementById('statsScreen').classList.add('hidden');
        if(statsListenerRef) statsListenerRef.off();
    }

    // Функція рендеру гри з підтримкою спеціальних елементів
    function startGame() {
        const randomIndex = Math.floor(Math.random() * QUESTION_BANK.length);
        currentQuestionSet = { ...QUESTION_BANK[randomIndex] };
        const qData = currentQuestionSet;
        document.getElementById('questionText').innerHTML = qData.text;
        const container = document.getElementById('gameOptionsContainer');
        
        let optionAHtml, optionBHtml;
        
        if (qData.special) {
            // Для абстрактних питань показуємо емодзі/символи замість картинок
            optionAHtml = `
                <div class="option-card" data-choice="A">
                    <div class="emoji-placeholder">${qData.emojiA || '❤️'}</div>
                    <h3>${qData.optA}</h3>
                </div>
            `;
            optionBHtml = `
                <div class="option-card" data-choice="B">
                    <div class="emoji-placeholder">${qData.emojiB || '💔'}</div>
                    <h3>${qData.optB}</h3>
                </div>
            `;
        } else {
            // Звичайні картинки з інтернету
            optionAHtml = `
                <div class="option-card" data-choice="A">
                    <img class="option-img" src="${qData.imgA}" alt="varA" loading="lazy">
                    <h3>${qData.optA}</h3>
                </div>
            `;
            optionBHtml = `
                <div class="option-card" data-choice="B">
                    <img class="option-img" src="${qData.imgB}" alt="varB" loading="lazy">
                    <h3>${qData.optB}</h3>
                </div>
            `;
        }
        
        container.innerHTML = optionAHtml + optionBHtml;
        
        // Додаємо обробники подій для нових карток
        document.querySelectorAll('.option-card').forEach(card => {
            card.removeEventListener('click', handleVote);
            card.addEventListener('click', handleVote);
        });
        
        function handleVote(e) {
            const card = e.currentTarget;
            const choiceVal = card.getAttribute('data-choice') === 'A' ? 'A' : 'B';
            vote(currentQuestionSet.id, choiceVal).then(() => {
                alert(`Твій вибір: ${choiceVal === 'A' ? currentQuestionSet.optA : currentQuestionSet.optB}! Дякуємо за участь 🎉`);
                startGame();
            }).catch(err => console.error(err));
        }
        
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('statsScreen').classList.add('hidden');
    }

    // Реєстрація гравця
    function registerUser(rawName) {
        if (!rawName.trim()) {
            alert("Введи ім'я!");
            return false;
        }
        const name = rawName.trim();
        const slug = generateSlug(name);
        auth.signInAnonymously().then(userCred => {
            currentUser = {
                uid: userCred.user.uid,
                name: name,
                slug: slug
            };
            database.ref(`/users/${currentUser.uid}`).set({ name: name, slug: slug, lastSeen: Date.now() });
            updateOnlineStatus();
            document.getElementById('userNameDisplay').innerHTML = `${name} / ${slug}`;
            document.getElementById('greetingMsg').innerHTML = `Вітаю, <strong>${name}</strong> (${slug})!`;
            document.getElementById('registerScreen').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
        }).catch(e => {
            console.error("Помилка аутентифікації:", e);
            alert("Помилка підключення, спробуйте ще раз");
        });
        return true;
    }

    // Прев'ю скорочення
    const nameInput = document.getElementById('usernameInput');
    const previewSpan = document.getElementById('previewNick');
    if (nameInput) {
        nameInput.addEventListener('input', (e) => {
            let val = e.target.value;
            if(val) previewSpan.innerText = generateSlug(val);
            else previewSpan.innerText = "Макс Суслік";
        });
    }

    // Кнопки навігації з перевіркою на існування
    const startBtn = document.getElementById('startRegisterBtn');
    if (startBtn) startBtn.onclick = () => registerUser(nameInput?.value || "");
    
    const playBtn = document.getElementById('playBtnMenu');
    if (playBtn) playBtn.onclick = () => startGame();
    
    const statsBtn = document.getElementById('statsBtnMenu');
    if (statsBtn) statsBtn.onclick = () => {
        loadGlobalStats();
        document.getElementById('statsScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
    };
    
    const backFromGame = document.getElementById('backToMenuFromGame');
    if (backFromGame) backFromGame.onclick = () => {
        document.getElementById('menuScreen').classList.remove('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
    };
    
    const backFromStats = document.getElementById('backToMenuFromStats');
    if (backFromStats) backFromStats.onclick = () => {
        document.getElementById('menuScreen').classList.remove('hidden');
        document.getElementById('statsScreen').classList.add('hidden');
    };
    
    const logoutBtn = document.getElementById('logoutBtnMenu');
    if (logoutBtn) logoutBtn.onclick = () => logout();
    
    const authorBtn = document.getElementById('authorBtn');
    if (authorBtn) authorBtn.onclick = () => alert("Савчук Юрій\nEmail: urasavchuk2206v@gmail.com\n+380671995144\n© 2025 Всі вибори справжні");

    // Звуки при кліку
    function playSoftClick() {
        let audio = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
        audio.volume = 0.15;
        audio.play().catch(e=>console.log("autoplay blocked"));
    }
    
    document.body.addEventListener('click', (e) => {
        if(e.target.closest('.btn') || e.target.closest('.option-card')) {
            playSoftClick();
        }
    });

    // Ініціалізація + кешування картинок
    window.onload = () => {
        document.getElementById('registerScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
        document.getElementById('statsScreen').classList.add('hidden');
        // Прелоад картинок
        QUESTION_BANK.forEach(q => {
            if (!q.special && q.imgA && q.imgA.startsWith('http')) {
                const img1 = new Image(); img1.src = q.imgA;
