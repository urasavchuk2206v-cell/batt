<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Wins?</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#e9ebee;
}

/* TOP BAR (як Facebook стиль) */
#topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:55px;
  background:#1877f2;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  z-index:100;
  font-weight:bold;
}

#online{
  font-size:14px;
}

/* START */
#start{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#1877f2;
  color:white;
  font-size:16px;
}

/* BATTLE */
#game{
  display:none;
  height:100vh;
}

.option{
  width:50%;
  height:100vh;
  position:relative;
  cursor:pointer;
  overflow:hidden;
  transition:0.2s;
}

.option:hover{
  transform:scale(1.02);
}

.option img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  padding:10px;
}

/* TEXT OVER IMAGE */
.label{
  position:absolute;
  bottom:25px;
  left:25px;
  font-size:32px;
  font-weight:bold;
  color:white;
  text-shadow:0 0 15px black;
}

/* RIGHT PANEL */
#panel{
  position:fixed;
  top:55px;
  right:-40%;
  width:40%;
  height:calc(100% - 55px);
  background:white;
  box-shadow:-5px 0 15px rgba(0,0,0,0.2);
  transition:0.3s;
  padding:20px;
  overflow:auto;
}

#panel.open{
  right:0;
}

#statsBtn{
  cursor:pointer;
  background:rgba(255,255,255,0.2);
  padding:6px 10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="online">👁 0 online</div>
  <div id="statsBtn" onclick="togglePanel()">📊 Stats</div>
</div>

<div id="start">
  <h1>Хто краще?</h1>
  <button onclick="start()">Start</button>
</div>

<div id="game">
  <div class="option" onclick="vote(current.a)">
    <img id="img1">
    <div class="label" id="text1"></div>
  </div>

  <div class="option" onclick="vote(current.b)">
    <img id="img2">
    <div class="label" id="text2"></div>
  </div>
</div>

<div id="panel">
  <h2>Live Statistics</h2>
  <div id="stats"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ONLINE */
const me = db.ref("online").push(true);
me.onDisconnect().remove();

db.ref("online").on("value", snap=>{
  document.getElementById("online").innerText = "👁 " + snap.numChildren() + " online";
});

/* PAIRS */
const pairs = [
  {
    a:"АТБ",
    b:"Сільпо",
    imgA:"https://upload.wikimedia.org/wikipedia/commons/7/7f/ATB-Market_logo.png",
    imgB:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Silpo_logo.png"
  },
  {
    a:"Піцца",
    b:"Суші",
    imgA:"https://images.unsplash.com/photo-1594007654729-407eedc4be65",
    imgB:"https://images.unsplash.com/photo-1579584425555-c3ce17fd4351"
  },
  {
    a:"Кава",
    b:"Чай",
    imgA:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",
    imgB:"https://images.unsplash.com/photo-1511920170033-f8396924c348"
  }
];

let current;

function start(){
  document.getElementById("start").style.display="none";
  document.getElementById("game").style.display="flex";
  next();
}

function next(){
  current = pairs[Math.floor(Math.random()*pairs.length)];

  img1.src = current.imgA;
  img2.src = current.imgB;

  text1.innerText = current.a;
  text2.innerText = current.b;
}

/* VOTE */
function vote(option){
  db.ref("votes/"+option).transaction(v=> (v||0)+1);
  next();
}

/* STATS */
db.ref("votes").on("value", snap=>{
  const data = snap.val() || {};
  let total = 0;

  for(let k in data) total += data[k];

  let html = "";

  for(let k in data){
    let p = total ? ((data[k]/total)*100).toFixed(0) : 0;
    html += `
      <p style="margin:10px 0;">
        <b>${k}</b> — ${p}%
      </p>`;
  }

  document.getElementById("stats").innerHTML = html;
});

/* PANEL */
function togglePanel(){
  document.getElementById("panel").classList.toggle("open");
}
</script>

</body>
</html>
