<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Битва Виборів | Обери свій шлях</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
            position: relative;
        }

        .app-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.5);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            z-index: 10;
        }

        .header-stats {
            background: #1e1f24cc;
            backdrop-filter: blur(20px);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .online-box {
            background: #00000055;
            padding: 6px 14px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 6px #2ecc71;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .avatar-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .avatar-mini {
            width: 36px;
            height: 36px;
            background: #4a4e6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            background-size: cover;
            color: white;
            border: 2px solid #fff;
        }

        .screen {
            padding: 24px 20px 34px;
            transition: 0.3s ease;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .hidden {
            display: none;
        }

        .btn {
            background: #2c2e3a;
            border: none;
            padding: 14px 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            width: 100%;
            margin: 8px 0;
            position: relative;
            z-index: 20;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3f4e74, #2d3a58);
        }

        .btn-primary:active { transform: scale(0.97); background: #1f2c46;}

        .btn-outline {
            background: transparent;
            border: 1.5px solid #3f4e74;
            color: #1f2c46;
        }

        .game-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .option-card {
            flex: 1;
            background: white;
            border-radius: 48px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
            border: 1px solid #ffffffaa;
        }

        .option-card:active { transform: scale(0.96);}
        
        .option-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 40px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #e0e0e0, #f5f5f5);
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }
        
        .emoji-placeholder {
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            background: linear-gradient(135deg, #ffe6f0, #ffd4e5);
            border-radius: 40px;
            margin-bottom: 16px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        .stat-container {
            background: #f8f9ffcc;
            border-radius: 32px;
            padding: 20px;
            margin-top: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ccc;
            padding: 12px 0;
            flex-wrap: wrap;
            gap: 8px;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.75rem;
            border-top: 1px solid #ddd9;
            background: #ffffff40;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 1px solid #bbb;
            margin-bottom: 16px;
            font-size: 16px;
        }
        
        @media (max-width: 550px) {
            .option-img, .emoji-placeholder { width: 110px; height: 110px; font-size: 4rem;}
            .game-options { gap: 12px;}
            .stat-item { flex-direction: column; align-items: flex-start;}
        }
        
        @media (max-width: 480px) {
            .option-img, .emoji-placeholder { width: 90px; height: 90px; font-size: 3rem;}
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="header-stats">
        <div class="online-box">
            <span class="online-dot"></span>
            <span id="onlineCounter">0</span> <span>онлайн</span>
        </div>
        <div class="avatar-group" id="avatarGroupHeader">
            <div class="avatar-mini" id="myAvatarPreview">🙂</div>
        </div>
    </div>

    <!-- Екран реєстрації -->
    <div id="registerScreen" class="screen">
        <h2 style="text-align:center; margin-bottom:20px;">✨ Битва виборів ✨</h2>
        <input type="text" id="usernameInput" placeholder="Твоє ім'я (напр. Максим)" autocomplete="off">
        <button id="startRegisterBtn" class="btn btn-primary">🚀 Почати подорож</button>
        <div style="margin-top:20px; font-size:12px; color:#555; text-align:center;">💡 Твій нікнейм: <span id="previewNick">Макс Суслік</span></div>
        <button id="authorBtn" style="margin-top: 25px; background:none; border:none; color:#2c3e66; text-decoration:underline; cursor:pointer;">Автор: Савчук Юрій</button>
    </div>

    <!-- Головне меню -->
    <div id="menuScreen" class="screen hidden">
        <div style="text-align:center; margin-bottom:20px; font-size:1.2rem;" id="greetingMsg">Вітаю, <strong id="userNameDisplay">Гість</strong>!</div>
        <div style="margin: 20px 0;">
            <button id="playBtnMenu" class="btn btn-primary">🎮 ГРАТИ</button>
            <button id="statsBtnMenu" class="btn btn-outline">📊 СТАТИСТИКА</button>
            <button id="logoutBtnMenu" class="btn" style="background:#5a626e;">🚪 Вийти</button>
        </div>
        <footer>⚡ обери між двома — покажи свій вибір!</footer>
    </div>

    <!-- Екран гри -->
    <div id="gameScreen" class="screen hidden">
        <h3 id="questionText" style="margin-bottom:16px; text-align:center;">Чай ☕ чи Кава?</h3>
        <div class="game-options" id="gameOptionsContainer"></div>
        <button id="backToMenuFromGame" class="btn btn-outline">⬅ Назад в меню</button>
    </div>

    <!-- Статистика -->
    <div id="statsScreen" class="screen hidden">
        <h3>📈 Глобальна статистика виборів</h3>
        <div id="statList" class="stat-container">Завантаження...</div>
        <button id="backToMenuFromStats" class="btn btn-outline" style="margin-top:18px;">🏠 До меню</button>
    </div>
</div>

<script>
    // ==================== БАЗА ПИТАНЬ ====================
    const QUESTION_BANK = [
        { id: "tea_coffee", text: "Що обираєш сьогодні?", optA: "Чай 🍃", optB: "Кава ☕", imgA: "https://picsum.photos/id/225/300/200", imgB: "https://picsum.photos/id/431/300/200", special: false },
        { id: "milf_student", text: "Хто твій вайб?", optA: "Мілфа ✨", optB: "Студентка 🎓", imgA: "https://picsum.photos/id/26/300/200", imgB: "https://picsum.photos/id/20/300/200", special: false },
        { id: "cars_value", text: "Що важливіше?", optA: "Машини 🚗", optB: "Цінності 💎", imgA: "https://picsum.photos/id/107/300/200", imgB: "https://picsum.photos/id/42/300/200", special: false },
        { id: "truth_lie", text: "Правда чи брехня?", optA: "Правда 🧠", optB: "Брехня 🎭", imgA: "heart", imgB: "broken", special: true, emojiA: "❤️", emojiB: "💔" },
        { id: "moments_money", text: "Що обираєш?", optA: "Моменти 📸", optB: "Гроші 💰", imgA: "https://picsum.photos/id/20/300/200", imgB: "https://picsum.photos/id/29/300/200", special: false },
        { id: "love_hate", text: "Ставлення до життя?", optA: "Любов 💕", optB: "Байдужість 😐", imgA: "heart", imgB: "neutral", special: true, emojiA: "💖", emojiB: "💨" },
        { id: "optimist_pessimist", text: "Ти хто?", optA: "Оптиміст 🌞", optB: "Песиміст 🌧️", imgA: "sun", imgB: "rain", special: true, emojiA: "☀️", emojiB: "⛈️" },
        { id: "cats_dogs", text: "Хто кращий друг?", optA: "Коти 🐱", optB: "Собаки 🐶", imgA: "https://picsum.photos/id/219/300/200", imgB: "https://picsum.photos/id/237/300/200", special: false },
        { id: "beach_mount", text: "Куди поїдемо?", optA: "Пляж 🌊", optB: "Гори ⛰️", imgA: "https://picsum.photos/id/15/300/200", imgB: "https://picsum.photos/id/104/300/200", special: false },
        { id: "pizza_pasta", text: "Італійська кухня?", optA: "Піца 🍕", optB: "Паста 🍝", imgA: "https://picsum.photos/id/108/300/200", imgB: "https://picsum.photos/id/127/300/200", special: false }
    ];

    // ==================== ЗМІННІ ====================
    let currentUser = null;
    let currentQuestionSet = null;
    let statsData = {};
    let onlineUsers = new Map();
    let heartbeatInterval = null;

    // Завантаження статистики з localStorage
    function loadStatsFromStorage() {
        const saved = localStorage.getItem('battle_stats');
        if (saved) {
            statsData = JSON.parse(saved);
        } else {
            statsData = {};
            QUESTION_BANK.forEach(q => {
                statsData[q.id] = { A: 0, B: 0 };
            });
        }
    }

    // Збереження статистики
    function saveStatsToStorage() {
        localStorage.setItem('battle_stats', JSON.stringify(statsData));
    }

    // Голосування
    function vote(questionId, choice) {
        if (!statsData[questionId]) statsData[questionId] = { A: 0, B: 0 };
        statsData[questionId][choice]++;
        saveStatsToStorage();
        updateStatsDisplay();
        
        // Додаємо голос користувача в історію
        const userHistory = JSON.parse(localStorage.getItem(`user_${currentUser.uid}_history`) || '{}');
        userHistory[questionId] = choice;
        localStorage.setItem(`user_${currentUser.uid}_history`, JSON.stringify(userHistory));
    }

    // Оновлення відображення статистики
    function updateStatsDisplay() {
        const statsDiv = document.getElementById('statList');
        if (!statsDiv) return;
        
        let html = '';
        for (let q of QUESTION_BANK) {
            let qStats = statsData[q.id] || { A: 0, B: 0 };
            let total = (qStats.A || 0) + (qStats.B || 0);
            let percentA = total ? Math.round((qStats.A || 0)/total*100) : 50;
            let percentB = total ? Math.round((qStats.B || 0)/total*100) : 50;
            html += `<div class="stat-item">
                        <strong>${q.text}</strong>
                        <span>✅ ${q.optA}: ${percentA}% (${qStats.A||0}) &nbsp;|&nbsp; ${q.optB}: ${percentB}% (${qStats.B||0})</span>
                     </div>`;
        }
        statsDiv.innerHTML = html || "<i>Немає голосів, будь першим!</i>";
    }

    // Генерація унікального ніку
    function generateSlug(name) {
        if (!name) return "Анонім";
        let base = name.trim().split(" ")[0];
        let suffix = Math.floor(Math.random() * 100);
        let funny = ["Суслік", "Вовчик", "Кексик", "Маг", "Лис", "Хижак", "Смайлик", "Грім", "Блискавка", "Сонечко", "Їжак", "Кролик"];
        let rand = funny[Math.floor(Math.random() * funny.length)];
        return `${base} ${rand}${suffix}`;
    }

    // ==================== ОНЛАЙН СИСТЕМА (без Firebase) ====================
    function initOnlineSystem() {
        // Генеруємо унікальний ID сесії
        const sessionId = localStorage.getItem('session_id') || 'session_' + Date.now() + '_' + Math.random();
        localStorage.setItem('session_id', sessionId);
        
        // Функція оновлення онлайн-статусу
        function updateOnlineList() {
            const allSessions = JSON.parse(localStorage.getItem('online_sessions') || '{}');
            const now = Date.now();
            let activeCount = 0;
            const avatarDiv = document.getElementById('avatarGroupHeader');
            
            // Очищаємо старі сесії (>10 секунд)
            for (let id in allSessions) {
                if (now - allSessions[id].timestamp > 10000) {
                    delete allSessions[id];
                } else {
                    activeCount++;
                }
            }
            
            // Додаємо поточну сесію
            if (currentUser) {
                allSessions[sessionId] = {
                    name: currentUser.name,
                    slug: currentUser.slug,
                    timestamp: now,
                    letter: currentUser.name.charAt(0).toUpperCase()
                };
                activeCount = Object.keys(allSessions).length;
            }
            
            localStorage.setItem('online_sessions', JSON.stringify(allSessions));
            document.getElementById('onlineCounter').innerText = activeCount;
            
            // Відображаємо аватарки
            avatarDiv.innerHTML = '';
            let shown = 0;
            for (let id in allSessions) {
                if (shown >= 5) break;
                const s = allSessions[id];
                const ava = document.createElement('div');
                ava.className = 'avatar-mini';
                ava.style.background = "#4e5b7b";
                ava.innerText = s.letter || '?';
                if (id === sessionId) ava.style.border = "3px solid gold";
                avatarDiv.appendChild(ava);
                shown++;
            }
            if (shown === 0) avatarDiv.innerHTML = '<div class="avatar-mini">🌐</div>';
        }
        
        // Оновлюємо кожні 3 секунди
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(updateOnlineList, 3000);
        updateOnlineList();
        
        // При виході видаляємо сесію
        window.addEventListener('beforeunload', () => {
            const allSessions = JSON.parse(localStorage.getItem('online_sessions') || '{}');
            delete allSessions[sessionId];
            localStorage.setItem('online_sessions', JSON.stringify(allSessions));
        });
    }

    // ==================== ФУНКЦІЇ ГРИ ====================
    function startGame() {
        const randomIndex = Math.floor(Math.random() * QUESTION_BANK.length);
        currentQuestionSet = { ...QUESTION_BANK[randomIndex] };
        const qData = currentQuestionSet;
        document.getElementById('questionText').innerHTML = qData.text;
        const container = document.getElementById('gameOptionsContainer');
        
        let optionAHtml, optionBHtml;
        
        if (qData.special) {
            optionAHtml = `
                <div class="option-card" data-choice="A">
                    <div class="emoji-placeholder">${qData.emojiA || '❤️'}</div>
                    <h3>${qData.optA}</h3>
                </div>
            `;
            optionBHtml = `
                <div class="option-card" data-choice="B">
                    <div class="emoji-placeholder">${qData.emojiB || '💔'}</div>
                    <h3>${qData.optB}</h3>
                </div>
            `;
        } else {
            optionAHtml = `
                <div class="option-card" data-choice="A">
                    <img class="option-img" src="${qData.imgA}" alt="varA" loading="lazy">
                    <h3>${qData.optA}</h3>
                </div>
            `;
            optionBHtml = `
                <div class="option-card" data-choice="B">
                    <img class="option-img" src="${qData.imgB}" alt="varB" loading="lazy">
                    <h3>${qData.optB}</h3>
                </div>
            `;
        }
        
        container.innerHTML = optionAHtml + optionBHtml;
        
        // Додаємо обробники
        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', function onClick() {
                const choiceVal = this.getAttribute('data-choice') === 'A' ? 'A' : 'B';
                vote(currentQuestionSet.id, choiceVal);
                // Звук
                playSoftClick();
                // Анімація зворотнього зв'язку
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                    alert(`Твій вибір: ${choiceVal === 'A' ? currentQuestionSet.optA : currentQuestionSet.optB}! 🎉`);
                    startGame();
                }, 100);
            }, { once: true });
        });
        
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('statsScreen').classList.add('hidden');
    }
    
    // Звук при кліку
    function playSoftClick() {
        try {
            let audio = new Audio("data:audio/wav;base64,U3RlYWx0aCBzb2Z0IGNsaWNr");
            audio.volume = 0.1;
            audio.play().catch(e => console.log("audio block"));
        } catch(e) {}
    }

    // Реєстрація
    function registerUser(rawName) {
        if (!rawName.trim()) {
            alert("Введи своє ім'я!");
            return false;
        }
        const name = rawName.trim();
        const slug = generateSlug(name);
        const uid = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        
        currentUser = {
            uid: uid,
            name: name,
            slug: slug
        };
        
        localStorage.setItem('current_user', JSON.stringify(currentUser));
        
        document.getElementById('userNameDisplay').innerHTML = `${name} <span style="font-size:0.8rem;">(${slug})</span>`;
        document.getElementById('greetingMsg').innerHTML = `Вітаю, <strong>${name}</strong>! Твій нік: ${slug}`;
        document.getElementById('myAvatarPreview').innerText = name.charAt(0).toUpperCase();
        
        document.getElementById('registerScreen').classList.add('hidden');
        document.getElementById('menuScreen').classList.remove('hidden');
        
        // Оновлюємо онлайн
        initOnlineSystem();
        
        return true;
    }
    
    // Вихід
    function logout() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        // Видаляємо сесію
        const sessionId = localStorage.getItem('session_id');
        if (sessionId) {
            const allSessions = JSON.parse(localStorage.getItem('online_sessions') || '{}');
            delete allSessions[sessionId];
            localStorage.setItem('online_sessions', JSON.stringify(allSessions));
        }
        currentUser = null;
        localStorage.removeItem('current_user');
        document.getElementById('registerScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
        document.getElementById('statsScreen').classList.add('hidden');
        document.getElementById('onlineCounter').innerText = '0';
    }
    
    // Перевірка збереженого користувача
    function checkSavedUser() {
        const saved = localStorage.getItem('current_user');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                document.getElementById('userNameDisplay').innerHTML = `${currentUser.name} <span style="font-size:0.8rem;">(${currentUser.slug})</span>`;
                document.getElementById('greetingMsg').innerHTML = `Вітаю, <strong>${currentUser.name}</strong>! Твій нік: ${currentUser.slug}`;
                document.getElementById('myAvatarPreview').innerText = currentUser.name.charAt(0).toUpperCase();
                document.getElementById('registerScreen').classList.add('hidden');
                document.getElementById('menuScreen').classList.remove('hidden');
                initOnlineSystem();
                return true;
            } catch(e) {}
        }
        return false;
    }

    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    window.onload = () => {
        loadStatsFromStorage();
        updateStatsDisplay();
        
        // Перевіряємо чи є збережений користувач
        const hasUser = checkSavedUser();
        if (!hasUser) {
            document.getElementById('registerScreen').classList.remove('hidden');
            document.getElementById('menuScreen').classList.add('hidden');
        }
        
        // Прелоад картинок
        QUESTION_BANK.forEach(q => {
            if (!q.special && q.imgA && q.imgA.startsWith('http')) {
                const img1 = new Image(); img1.src = q.imgA;
                const img2 = new Image(); img2.src = q.imgB;
            }
        });
        
        // Прев'ю ніку
        const nameInput = document.getElementById('usernameInput');
        const previewSpan = document.getElementById('previewNick');
        if (nameInput) {
            nameInput.addEventListener('input', (e) => {
                let val = e.target.value;
                if(val) previewSpan.innerText = generateSlug(val);
                else previewSpan.innerText = "Макс Суслік";
            });
        }
    };
    
    // ==================== КНОПКИ ====================
    document.getElementById('startRegisterBtn')?.addEventListener('click', () => {
        const input = document.getElementById('usernameInput');
        registerUser(input?.value || "");
    });
    
    document.getElementById('playBtnMenu')?.addEventListener('click', () => startGame());
    
    document.getElementById('statsBtnMenu')?.addEventListener('click', () => {
        updateStatsDisplay();
        document.getElementById('statsScreen').classList.remove('hidden');
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
    });
    
    document.getElementById('backToMenuFromGame')?.addEventListener('click', () => {
